<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1><span>Weather</span> Dashboard</h1>
        </header>

        <div class="search-box">
            <input type="text" id="cityInput" placeholder="Enter city name... (e.g., Karachi, London)">
            <button id="searchBtn">Search</button>
        </div>

        <div class="weather-main" id="weatherBox" style="display: none;">
            <div class="weather-header">
                <div class="city-name" id="cityName">---</div>
                <div class="date-tag" id="currentDate">---</div>
            </div>
            <div class="weather-body">
                <div class="temp-display">
                    <span class="temp-num" id="mainTemp">--</span><span class="temp-unit">°C</span>
                    <div class="weather-desc" id="weatherDesc">---</div>
                </div>
                <div class="details-grid">
                    <div class="detail-item">
                        <div class="detail-label">💧 Humidity</div>
                        <div class="detail-value" id="humidityVal">--%</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">🍃 Wind Speed</div>
                        <div class="detail-value" id="windVal">-- km/h</div>
                    </div>
                </div>
            </div>
        </div>

        <h2 class="forecast-title" id="forecastTitle" style="display: none;">5-Day Forecast</h2>
        <div class="forecast-grid" id="forecastGrid">
            </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
